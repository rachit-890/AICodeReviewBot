spring.application.name=prReviewBot

# API Keys
github.token=${GITHUB_TOKEN}
gemini.api.key=${GEMINI_API_KEY}
webhook.secret=${WEBHOOK_SECRET:default-webhook-secret}

# Active profile - change to 'prod' when deploying
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===== PostgreSQL =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codereviewdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rachit}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rachit123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA (common settings) =====
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codereviewdb}
spring.flyway.user=${SPRING_DATASOURCE_USERNAME:rachit}
spring.flyway.password=${SPRING_DATASOURCE_PASSWORD:rachit123}

# ===== Redis =====
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always