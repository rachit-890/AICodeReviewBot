<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SentinAI | Premium AI Code Review Agent</title>
    <meta name="description" content="SaaS-grade AI security agent auditing codebases, pull requests, and client credential metadata in real-time." />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300..800&family=Geist:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>

                outline: "#374151",
                "outline-variant": "#4b5563"

              fontFamily: {
                sans: ["Geist", "Plus Jakarta Sans", "sans-serif"],
