spring.application.name=prReviewBot

# API Keys
github.token=${GITHUB_TOKEN}
gemini.api.key=${GEMINI_API_KEY}

# ===== PostgreSQL (Docker) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/codereviewdb
spring.datasource.username=rachit
spring.datasource.password=rachit123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.url=jdbc:postgresql://localhost:5432/codereviewdb
spring.flyway.user=rachit
spring.flyway.password=rachit123

# ===== Redis (Docker) =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

# Actuator
management.endpoints.web.exposure.include=health

# Logging
logging.level.com.proj.prreviewbot=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG